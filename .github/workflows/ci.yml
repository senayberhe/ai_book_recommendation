name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy langchain-core gradio python-dotenv
          pip install pytest ruff mypy pandas-stubs

      - name: Lint (ruff)
        run: ruff check book_recommender tests

      - name: Type check (mypy)
        run: mypy book_recommender
        continue-on-error: true

      - name: Run tests
        run: pytest
